# ============================================================
# Nginx Reverse Proxy — CRMA42 Alumni System
# วางไฟล์นี้ที่: /etc/nginx/sites-available/crma42
# สร้าง symlink:  sudo ln -s /etc/nginx/sites-available/crma42 /etc/nginx/sites-enabled/
# ทดสอบ:         sudo nginx -t
# Reload:         sudo systemctl reload nginx
#
# ✏️ สิ่งที่ต้องแก้ก่อน deploy มีเพียง 3 บรรทัด:
#   1. server_name   — แทน YOUR_DOMAIN ด้วย domain จริง (2 จุด)
#   2. ssl_certificate / ssl_certificate_key — path cert ที่มีอยู่แล้ว
# ============================================================

# ──────────────────────────────────────────────────────────
# Rate Limit zones (ใส่ใน http block ของ /etc/nginx/nginx.conf)
# เพิ่ม 2 บรรทัดนี้ใน nginx.conf ก่อน แล้วเปิด limit_req ด้านล่าง
#   limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/s;
#   limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
# ──────────────────────────────────────────────────────────

# ──────────────────────────────────────────────────────────
# Upstream — Next.js รันบน PM2 พอร์ต 3000
# ──────────────────────────────────────────────────────────
upstream nextjs_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ──────────────────────────────────────────────────────────
# HTTP → HTTPS redirect
# ──────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;

    # ✏️ แก้ YOUR_DOMAIN เป็น domain จริง เช่น crma42.rta.mi.th
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    return 301 https://$host$request_uri;
}

# ──────────────────────────────────────────────────────────
# HTTPS — main server block
# ──────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # ✏️ แก้ YOUR_DOMAIN เป็น domain จริง
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ──────────────────────────────────────────────────────
    # ✏️ SSL — ใส่ path cert ที่มีอยู่แล้ว
    #
    # Let's Encrypt (Certbot):
    #   ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    #   ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    #
    # ZeroSSL / manual:
    #   ssl_certificate     /etc/ssl/YOUR_DOMAIN/fullchain.pem;
    #   ssl_certificate_key /etc/ssl/YOUR_DOMAIN/private.key;
    # ──────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ──────────────────────────────────────────────────────
    # Security Headers
    # ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ──────────────────────────────────────────────────────
    # Logging
    # ──────────────────────────────────────────────────────
    access_log /var/log/nginx/crma42_access.log combined;
    error_log  /var/log/nginx/crma42_error.log  warn;

    # ──────────────────────────────────────────────────────
    # Static assets — cache 1 ปี (filename มี content hash)
    # ──────────────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://nextjs_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ──────────────────────────────────────────────────────
    # WebSocket — Socket.IO (messaging / real-time dashboard)
    # ──────────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ──────────────────────────────────────────────────────
    # Auth API — rate limit เข้มงวด (ป้องกัน brute-force OTP/login)
    # เปิด comment บรรทัด limit_req หลังเพิ่ม zone ใน nginx.conf แล้ว
    # ──────────────────────────────────────────────────────
    location /api/auth/ {
        # limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass         http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ──────────────────────────────────────────────────────
    # General API
    # ──────────────────────────────────────────────────────
    location /api/ {
        # limit_req zone=api_limit burst=50 nodelay;
        proxy_pass         http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ──────────────────────────────────────────────────────
    # Health check — ปิด log ไม่ให้รก
    # ──────────────────────────────────────────────────────
    location = /api/dashboard/health {
        proxy_pass http://nextjs_app;
        access_log off;
    }

    # ──────────────────────────────────────────────────────
    # All other requests → Next.js
    # ──────────────────────────────────────────────────────
    location / {
        proxy_pass         http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_buffering         on;
        proxy_buffer_size       16k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;

        proxy_connect_timeout   10s;
        proxy_send_timeout      60s;
        proxy_read_timeout      60s;

        # ขนาด upload สูงสุด — รูปโปรไฟล์ + สลิป
        client_max_body_size    20M;
    }
}

